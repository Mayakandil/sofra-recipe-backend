<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofra - Recipe</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <img src="Frame 1.png" alt="Sofra Logo" class="main-logo">
        <p>Select your ingredients, We'll handle the menu.</p>
    </header>

    <main class="recipe-detail-container">
        <button onclick="window.history.back()" class="action-btn back-btn">← Back</button>
        <div id="recipeDetail" class="recipe-detail-card">
            <div class="placeholder-msg">Loading recipe...</div>
        </div>
    </main>

    <script src="recipe.js"></script>
</body>
</html>
